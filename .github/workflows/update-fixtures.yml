name: Update live fixtures

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-live-fixtures
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch current fixtures
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-fixtures.mjs

      - name: Update shared predictions
        run: node scripts/update-predictions.mjs

      - name: Publish changed fixture data
        run: |
          if [ -z "$(git status --porcelain -- fixtures.json predictions.json)" ]; then
            echo "Fixture and prediction data are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures.json predictions.json
          git commit -m "Update live fixtures and predictions"
          git push
